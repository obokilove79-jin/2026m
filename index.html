<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마우스 연습 게임</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; user-select:none; }
body { font-family:sans-serif; background:#f5f5f0; }
#app { padding:12px; max-width:680px; margin:0 auto; }
#header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
#title { font-size:18px; font-weight:500; color:#111; }
#sboard { display:flex; gap:8px; }
.sc { background:#f0efe8; border-radius:8px; padding:4px 12px; font-size:12px; color:#666; }
.sc span { font-weight:500; color:#111; font-size:14px; }
#tabs { display:flex; gap:5px; margin-bottom:10px; flex-wrap:wrap; }
.tab { padding:6px 10px; border-radius:8px; font-size:12px; cursor:pointer; border:1px solid #ccc; background:#fff; color:#888; white-space:nowrap; }
.tab.active { background:#f0efe8; color:#111; font-weight:500; border-color:#aaa; }
.tab.easy { border-color:#1D9E75; color:#1D9E75; }
.tab.easy.active { background:#E1F5EE; color:#0F6E56; }
.tab.hard { border-color:#E24B4A; color:#E24B4A; }
.tab.hard.active { background:#FCEBEB; color:#A32D2D; }
.tab.puzzle { border-color:#378ADD; color:#378ADD; }
.tab.puzzle.active { background:#E6F1FB; color:#185FA5; }
#mbar { background:#f0efe8; border-radius:10px; padding:8px 12px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
#micon { font-size:18px; width:24px; text-align:center; }
#mtext { font-size:13px; font-weight:500; color:#111; }
#msub { font-size:11px; color:#888; margin-top:1px; }
#pbar { height:8px; background:#ddd; border-radius:4px; margin-bottom:8px; }
#pfill { height:8px; border-radius:4px; background:#1D9E75; transition:width .25s; }
#game { position:relative; width:100%; height:420px; background:#fff; border:1px solid #ddd; border-radius:12px; overflow:hidden; }

.balloon,.target { position:absolute; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; }
.balloon:hover,.target:hover { transform:scale(1.12); }
.balloon.pop,.target.pop { animation:pop .2s ease-out forwards !important; transition:none !important; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(0)} }
.box { position:absolute; cursor:pointer; display:flex; align-items:center; justify-content:center; width:70px; height:70px; font-size:36px; border-radius:12px; background:#f0efe8; border:2px solid #ccc; animation:wobble 2.5s ease-in-out infinite; }
@keyframes wobble { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg) scale(1.05)} }
.box.opened { animation:openPop .3s ease forwards !important; }
@keyframes openPop { 0%{transform:scale(1)} 50%{transform:scale(1.4) rotate(15deg)} 100%{transform:scale(0)} }
.fruit { position:absolute; cursor:grab; font-size:32px; display:flex; align-items:center; justify-content:center; width:58px; height:58px; border-radius:12px; border:2px solid #ccc; background:#fff; animation:frb 1.2s ease-in-out infinite; }
.fruit:hover { border-color:#1D9E75; }
.fruit.dragging { cursor:grabbing; opacity:.9; animation:none; z-index:100; border-color:#1D9E75; }
@keyframes frb { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-7px) rotate(3deg)} }
.dzone { position:absolute; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:36px; transition:all .2s; border:2.5px dashed #ccc; }
.dzone.cart { width:90px; height:90px; border-color:#BA7517; }
.dzone.basket { width:78px; height:78px; border-color:#1D9E75; }
.dzone.lit { transform:scale(1.08); }
.dzone.cart.lit { background:#FAEEDA; border-color:#BA7517; }
.dzone.basket.lit { background:#E1F5EE; border-color:#1D9E75; }
.dzone.hit { animation:dzp .3s ease; }
@keyframes dzp { 0%{transform:scale(1)} 40%{transform:scale(1.2)} 100%{transform:scale(1)} }
.dzlbl { font-size:10px; margin-top:2px; font-weight:500; white-space:nowrap; color:#BA7517; }
.dzone.basket .dzlbl { color:#1D9E75; }
.fbtxt { position:absolute; pointer-events:none; font-size:20px; font-weight:500; animation:fbu 1s ease-out forwards; z-index:200; }
@keyframes fbu { 0%{opacity:1;transform:translateY(0) scale(1.1)} 100%{opacity:0;transform:translateY(-55px) scale(.8)} }
#overlay { position:absolute; inset:0; background:rgba(255,255,255,.96); display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:12px; z-index:300; gap:10px; }
#overlay h2 { font-size:38px; }
#overlay p { font-size:14px; color:#444; font-weight:500; }
.ov-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.ov-btn { padding:9px 18px; border-radius:8px; background:#1D9E75; color:#fff; border:none; font-size:13px; font-weight:500; cursor:pointer; }
.ov-btn.next { background:#378ADD; }
.ov-btn:hover { opacity:.85; }

#pz-ui { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; padding:8px 10px; gap:6px; overflow:hidden; }
#pz-topbar { width:100%; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.pz-badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; border:1.5px solid #ccc; color:#aaa; margin-right:3px; }
.pz-badge.done { background:#E1F5EE; border-color:#1D9E75; color:#0F6E56; }
.pz-badge.cur { background:#E6F1FB; border-color:#378ADD; color:#185FA5; font-weight:600; }
#pz-cntlbl { font-size:11px; color:#888; }
#pz-cntlbl b { color:#111; }
#pz-progbar { width:100%; height:5px; background:#ddd; border-radius:3px; flex-shrink:0; }
#pz-progfill { height:5px; border-radius:3px; background:#378ADD; transition:width .3s; width:0%; }
#pz-boards { display:flex; gap:14px; align-items:flex-start; justify-content:center; flex-shrink:0; }
.pz-col-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; }
.pz-col-lbl { font-size:10px; color:#888; }
#pz-tray-area { width:100%; flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; gap:4px; overflow:hidden; }
#pz-tray-lbl { font-size:10px; color:#888; flex-shrink:0; }
#pz-tray { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; align-content:flex-start; width:100%; overflow-y:auto; padding:5px; background:#f0efe8; border:1.5px solid #ddd; border-radius:8px; flex:1; min-height:0; }
.pz-ghost { position:fixed; pointer-events:none; z-index:9999; border:2px solid #378ADD; border-radius:5px; overflow:hidden; opacity:.92; box-shadow:0 4px 16px rgba(0,0,0,.25); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">🖱️ 마우스 연습 게임</div>
    <div id="sboard">
      <div class="sc">점수 <span id="scEl">0</span>/<span id="goalEl">1000</span></div>
      <div class="sc">⭐<span id="stEl">0</span>/3</div>
    </div>
  </div>
  <div id="tabs">
    <div class="tab easy" data-m="click-easy">🎯 클릭 초보</div>
    <div class="tab hard" data-m="click-hard">🎯 클릭 중급</div>
    <div class="tab" data-m="dbl">👆 더블클릭</div>
    <div class="tab" data-m="drag">🛒 드래그</div>
    <div class="tab puzzle" data-m="puzzle">🧩 퍼즐</div>
    <div class="tab" data-m="draw">✏️ 그리기</div>
  </div>
  <div id="mbar">
    <div id="micon">🎯</div>
    <div>
      <div id="mtext">풍선을 클릭해서 터뜨려요!</div>
      <div id="msub">남은 점수: <span id="sleft">1000</span>점</div>
    </div>
  </div>
  <div id="pbar"><div id="pfill" style="width:0%"></div></div>
  <div id="game"></div>
  <div style="text-align:right;font-size:11px;color:#aaa;margin-top:6px;padding-right:2px;">made by Jin</div>
</div>

<script>
const G=document.getElementById('game');
const scEl=document.getElementById('scEl');
const goalEl=document.getElementById('goalEl');
const stEl=document.getElementById('stEl');
const mtEl=document.getElementById('mtext');
const miEl=document.getElementById('micon');
const msEl=document.getElementById('msub');
const slEl=document.getElementById('sleft');
const pf=document.getElementById('pfill');
const pb=document.getElementById('pbar');
const sb=document.getElementById('sboard');

const GOALS={'click-easy':1000,'click-hard':1000,dbl:1000,drag:1000,puzzle:0,draw:0};
const EMOJIS=['🎈','🎉','⭐','🌟','💫','🍭','🍬','🎀','🎵','🏆','🌈','🦋'];
const FRUITS=['🍎','🍊','🍋','🍇','🍓','🍑','🍍','🥝','🍒','🍆'];
const BOXES=['📦','🎁','📫','🗃️','📮','🧸','🪀','🎯'];

let score=0,mode='click-easy',done=false,goal=1000;
let _intervals=[],_timeouts=[];

const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const rndPts=(mn,mx)=>Math.round(rnd(mn,mx)/10)*10;
function si(fn,ms){const id=setInterval(fn,ms);_intervals.push(id);return id;}
function st(fn,ms){const id=setTimeout(fn,ms);_timeouts.push(id);return id;}
function clearAll(){_intervals.forEach(id=>clearInterval(id));_timeouts.forEach(id=>clearTimeout(id));_intervals=[];_timeouts=[];}

function feedback(x,y,pts,color){
  const el=document.createElement('div');el.className='fbtxt';
  el.textContent='+'+pts+'점!';el.style.cssText=`left:${x-20}px;top:${y-10}px;color:${color||'#1D9E75'};`;
  G.appendChild(el);setTimeout(()=>el.remove(),1000);
}
function addScore(pts,x,y,color){
  if(done)return;
  score=Math.min(goal,score+pts);scEl.textContent=score;slEl.textContent=Math.max(0,goal-score);
  stEl.textContent=Math.min(3,Math.floor(score/(goal/3)));
  pf.style.width=(score/goal*100).toFixed(1)+'%';feedback(x,y,pts,color);
  if(score>=goal){done=true;setTimeout(showWin,500);}
}
function showWin(){
  G.innerHTML='';const o=document.createElement('div');o.id='overlay';
  o.innerHTML=`<h2>🎉🏆🎉</h2><p>${goal}점 달성! 잘했어요!</p><div class="ov-btns"><button class="ov-btn" onclick="resetGame()">다시 하기</button></div>`;
  G.appendChild(o);
}
function resetGame(){clearAll();score=0;done=false;scEl.textContent=0;stEl.textContent=0;pf.style.width='0%';G.innerHTML='';startMode(mode);}

function startMode(m){
  clearAll();
  mode=m;goal=GOALS[m]||1000;G.innerHTML='';score=0;done=false;
  scEl.textContent=0;stEl.textContent=0;pf.style.width='0%';goalEl.textContent=goal;slEl.textContent=goal;
  const isPz=m==='puzzle'||m==='draw';
  sb.style.display=isPz?'none':'flex';pb.style.display=isPz?'none':'block';msEl.style.display=isPz?'none':'block';
  const cfg={
    'click-easy':{icon:'🎯',text:'풍선을 클릭해서 터뜨려요! ⭐ 초보'},
    'click-hard':{icon:'🎯',text:'올라가는 풍선을 터뜨려요! 🔥 중급'},
    dbl:{icon:'👆',text:'상자를 두 번 클릭해서 열어요!'},
    drag:{icon:'🛒',text:'🛒 카트 100~300점 / 🧺 바구니 50~150점'},
    puzzle:{icon:'🧩',text:'그림 조각을 드래그해서 완성해요!'},
    draw:{icon:'✏️',text:'마우스 누른 채 자유롭게 그려봐요!'}
  };
  const c=cfg[m];miEl.textContent=c.icon;mtEl.textContent=c.text;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.m===m));
  if(m==='click-easy')startClickEasy();
  else if(m==='click-hard')startClickHard();
  else if(m==='dbl')startDbl();
  else if(m==='drag')startDrag();
  else if(m==='puzzle')startPuzzle(1);
  else startDraw();
}

function startClickEasy(){
  const active=new Set();
  function spawn(){
    if(done||active.size>=8)return;
    const el=document.createElement('div');el.className='target';
    const sz=rnd(50,74);
    el.style.cssText=`width:${sz}px;height:${sz}px;left:${rnd(10,G.offsetWidth-sz-10)}px;top:${rnd(10,G.offsetHeight-sz-10)}px;font-size:${Math.round(sz*.65)}px;`;
    el.textContent=EMOJIS[rnd(0,EMOJIS.length-1)];active.add(el);let used=false;
    el.addEventListener('click',e=>{if(done||used)return;used=true;active.delete(el);el.classList.add('pop');const r=G.getBoundingClientRect();addScore(rndPts(10,30),e.clientX-r.left,e.clientY-r.top);st(()=>{el.remove();spawn();spawn();},220);});
    G.appendChild(el);
    st(()=>{if(el.parentNode&&!used){active.delete(el);el.remove();spawn();}},rnd(3500,5500));
  }
  for(let i=0;i<7;i++)st(spawn,i*300);
  si(()=>{if(!done&&active.size<6)spawn();},900);
}

function startClickHard(){
  const active=new Set();
  function spawnB(){
    if(done||active.size>=6)return;
    const el=document.createElement('div');el.className='balloon';
    const sz=rnd(50,74),left=rnd(10,G.offsetWidth-sz-10),dur=rnd(5000,8000);
    el.style.cssText=`width:${sz}px;height:${sz}px;left:${left}px;bottom:-${sz}px;font-size:${Math.round(sz*.65)}px;position:absolute;transition:bottom ${dur}ms linear;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;`;
    el.textContent=EMOJIS[rnd(0,EMOJIS.length-1)];active.add(el);G.appendChild(el);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.bottom=(G.offsetHeight+sz)+'px';}));
    let used=false;
    el.addEventListener('click',e=>{if(done||used)return;used=true;active.delete(el);el.style.transition='none';el.classList.add('pop');const r=G.getBoundingClientRect();addScore(rndPts(10,30),e.clientX-r.left,e.clientY-r.top);st(()=>{el.remove();spawnB();},250);});
    st(()=>{if(el.parentNode&&!used){active.delete(el);el.remove();spawnB();}},dur+200);
  }
  for(let i=0;i<5;i++)st(spawnB,i*400);
  si(()=>{if(!done&&active.size<5)spawnB();},1200);
}

function startDbl(){
  const active=new Set();
  function spawnBox(){
    if(done||active.size>=6)return;
    const el=document.createElement('div');el.className='box';
    el.style.cssText=`left:${rnd(16,G.offsetWidth-86)}px;top:${rnd(16,G.offsetHeight-86)}px;`;
    el.textContent=BOXES[rnd(0,BOXES.length-1)];active.add(el);let clicks=0,timer,used=false;
    el.addEventListener('click',e=>{
      if(done||used)return;clicks++;clearTimeout(timer);
      if(clicks===1){el.style.transform='scale(1.18) rotate(8deg)';timer=setTimeout(()=>{clicks=0;el.style.transform='';},450);}
      if(clicks>=2){used=true;active.delete(el);el.classList.add('opened');el.textContent='🎊';const r=G.getBoundingClientRect();addScore(rndPts(10,30),e.clientX-r.left,e.clientY-r.top,'#534AB7');st(()=>{el.remove();spawnBox();spawnBox();},350);}
    });
    G.appendChild(el);
    st(()=>{if(el.parentNode&&!used){active.delete(el);el.remove();spawnBox();}},rnd(5000,9000));
  }
  for(let i=0;i<5;i++)st(spawnBox,i*350);
  si(()=>{if(!done&&active.size<5)spawnBox();},1000);
}

function startDrag(){
  const cart=document.createElement('div');cart.className='dzone cart';cart.dataset.t='cart';
  cart.style.cssText='right:14px;top:130px;';cart.innerHTML='🛒<div class="dzlbl">100~300점</div>';G.appendChild(cart);
  const basket=document.createElement('div');basket.className='dzone basket';basket.dataset.t='basket';
  basket.style.cssText='right:20px;top:20px;';basket.innerHTML='🧺<div class="dzlbl">50~150점</div>';G.appendChild(basket);
  const onScreen=new Set();
  function spawnFruit(){
    if(done||onScreen.size>=5)return;
    const el=document.createElement('div');el.className='fruit';el.textContent=FRUITS[rnd(0,FRUITS.length-1)];
    el.style.left=rnd(10,185)+'px';el.style.top=rnd(10,G.offsetHeight-68)+'px';onScreen.add(el);
    let sx,sy,sl,st2,dragging=false,used=false;
    el.addEventListener('mousedown',e=>{if(used)return;e.preventDefault();dragging=true;el.classList.add('dragging');sx=e.clientX;sy=e.clientY;sl=parseInt(el.style.left);st2=parseInt(el.style.top);document.querySelectorAll('.dzone').forEach(d=>d.classList.add('lit'));});
    const mv=e=>{if(!dragging)return;el.style.left=(sl+e.clientX-sx)+'px';el.style.top=(st2+e.clientY-sy)+'px';};
    const up=()=>{
      if(!dragging)return;dragging=false;el.classList.remove('dragging');document.querySelectorAll('.dzone').forEach(d=>d.classList.remove('lit'));if(used)return;
      const er=el.getBoundingClientRect();
      document.querySelectorAll('.dzone').forEach(dz=>{if(used)return;const dr=dz.getBoundingClientRect();const ox=Math.max(0,Math.min(er.right,dr.right)-Math.max(er.left,dr.left));const oy=Math.max(0,Math.min(er.bottom,dr.bottom)-Math.max(er.top,dr.top));if(ox*oy>400){used=true;onScreen.delete(el);const pts=dz.dataset.t==='cart'?rndPts(100,300):rndPts(50,150);const col=dz.dataset.t==='cart'?'#BA7517':'#1D9E75';dz.classList.add('hit');addScore(pts,parseInt(el.style.left)+20,parseInt(el.style.top),col);el.remove();st(()=>{dz.classList.remove('hit');spawnFruit();spawnFruit();},350);}});
    };
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);G.appendChild(el);
  }
  for(let i=0;i<4;i++)st(spawnFruit,i*200);
  si(()=>{if(!done&&onScreen.size<4)spawnFruit();},500);
}

const PZ_DATA=[
  {name:'강아지',emoji:'🐶',grid:2},
  {name:'고양이',emoji:'🐱',grid:3},
  {name:'곰',emoji:'🐻',grid:4}
];

function makeEmojiCanvas(emoji,size,grid){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#FFF9F0';ctx.beginPath();ctx.roundRect(0,0,size,size,8);ctx.fill();
  ctx.font=`${Math.round(size*.78)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(emoji,size/2,size/2+size*.03);
  if(grid){const ps=size/grid;ctx.strokeStyle='rgba(0,0,0,.13)';ctx.lineWidth=1.5;for(let i=1;i<grid;i++){ctx.beginPath();ctx.moveTo(i*ps,0);ctx.lineTo(i*ps,size);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*ps);ctx.lineTo(size,i*ps);ctx.stroke();}}
  return c;
}

function startPuzzle(lv){
  G.innerHTML='';
  let _onMove=null,_onUp=null;
  const {emoji,grid}=PZ_DATA[lv-1];
  const total=grid*grid;let placed=0;
  const GW=G.offsetWidth||640;const GH=G.offsetHeight||420;
  const boardSize=Math.floor(Math.min((GH-160)/1,(GW-60)/2,180));
  const ps=Math.floor(boardSize/grid);const bs=ps*grid;
  const trayPs=Math.max(32,Math.min(ps,Math.floor((GW-40)/(total+1)),70));

  const ui=document.createElement('div');ui.id='pz-ui';G.appendChild(ui);
  const topbar=document.createElement('div');topbar.id='pz-topbar';
  const badges=document.createElement('div');
  ['하','중','상'].forEach((l,i)=>{const b=document.createElement('span');b.className='pz-badge';b.textContent='🧩'+l;if(i+1<lv)b.classList.add('done');if(i+1===lv)b.classList.add('cur');badges.appendChild(b);});
  const cntLbl=document.createElement('div');cntLbl.id='pz-cntlbl';cntLbl.innerHTML=`완성 <b id="pzcnt">0</b>/${total}`;
  topbar.appendChild(badges);topbar.appendChild(cntLbl);ui.appendChild(topbar);
  const progWrap=document.createElement('div');progWrap.id='pz-progbar';
  const progFill=document.createElement('div');progFill.id='pz-progfill';progWrap.appendChild(progFill);ui.appendChild(progWrap);

  const boardsRow=document.createElement('div');boardsRow.id='pz-boards';
  const prevWrap=document.createElement('div');prevWrap.className='pz-col-wrap';
  const prevLbl=document.createElement('div');prevLbl.className='pz-col-lbl';prevLbl.textContent='완성 그림';
  const prevC=makeEmojiCanvas(emoji,bs,grid);
  prevC.style.cssText=`border:2px solid #ddd;border-radius:8px;display:block;width:${bs}px;height:${bs}px;`;
  prevWrap.appendChild(prevLbl);prevWrap.appendChild(prevC);boardsRow.appendChild(prevWrap);

  const boardWrap=document.createElement('div');boardWrap.className='pz-col-wrap';
  const boardLbl=document.createElement('div');boardLbl.className='pz-col-lbl';boardLbl.textContent='여기에 맞춰요!';
  const boardEl=document.createElement('div');
  boardEl.style.cssText=`position:relative;width:${bs}px;height:${bs}px;border:2px solid #bbb;border-radius:8px;overflow:hidden;background:#f5f0e8;flex-shrink:0;`;
  const slots=[];
  for(let r=0;r<grid;r++){for(let c=0;c<grid;c++){
    const s=document.createElement('div');
    s.style.cssText=`position:absolute;left:${c*ps}px;top:${r*ps}px;width:${ps}px;height:${ps}px;border:1px dashed #bbb;background:rgba(255,255,255,.25);transition:background .12s;`;
    s.dataset.r=r;s.dataset.c=c;s.dataset.filled='0';boardEl.appendChild(s);slots.push(s);
  }}
  boardWrap.appendChild(boardLbl);boardWrap.appendChild(boardEl);boardsRow.appendChild(boardWrap);
  ui.appendChild(boardsRow);

  const trayArea=document.createElement('div');trayArea.id='pz-tray-area';
  const trayLbl=document.createElement('div');trayLbl.id='pz-tray-lbl';trayLbl.textContent='👇 조각을 드래그해서 위 판에 맞춰요!';
  const tray=document.createElement('div');tray.id='pz-tray';
  trayArea.appendChild(trayLbl);trayArea.appendChild(tray);ui.appendChild(trayArea);

  const bigC=makeEmojiCanvas(emoji,bs,0);
  const order=[...Array(total).keys()].sort(()=>Math.random()-.5);
  const pieceDivs=[];
  order.forEach(idx=>{
    const row=Math.floor(idx/grid),col=idx%grid;
    const pc=document.createElement('canvas');pc.width=trayPs;pc.height=trayPs;
    pc.getContext('2d').drawImage(bigC,col*ps,row*ps,ps,ps,0,0,trayPs,trayPs);
    const wrap=document.createElement('div');
    wrap.style.cssText=`width:${trayPs}px;height:${trayPs}px;border:2px solid #ccc;border-radius:5px;overflow:hidden;cursor:grab;flex-shrink:0;transition:opacity .2s;`;
    wrap.dataset.row=row;wrap.dataset.col=col;wrap.dataset.used='0';
    wrap.appendChild(pc);tray.appendChild(wrap);pieceDivs.push(wrap);
  });

  let ghost=null,dWrap=null,dRow=-1,dCol=-1;
  pieceDivs.forEach(pw=>{
    pw.addEventListener('mousedown',e=>{
      if(pw.dataset.used==='1')return;e.preventDefault();
      dWrap=pw;dRow=+pw.dataset.row;dCol=+pw.dataset.col;
      const src=pw.querySelector('canvas');
      ghost=document.createElement('div');ghost.className='pz-ghost';
      ghost.style.cssText=`width:${trayPs}px;height:${trayPs}px;left:${e.clientX-trayPs/2}px;top:${e.clientY-trayPs/2}px;`;
      const gc=document.createElement('canvas');gc.width=trayPs;gc.height=trayPs;
      gc.getContext('2d').drawImage(src,0,0);ghost.appendChild(gc);document.body.appendChild(ghost);
      pw.style.opacity='.2';
      slots.forEach(s=>{if(s.dataset.filled==='0')s.style.background='rgba(55,138,221,.15)';});
    });
  });

  _onMove=e=>{
    if(!ghost)return;
    ghost.style.left=(e.clientX-trayPs/2)+'px';ghost.style.top=(e.clientY-trayPs/2)+'px';
    slots.forEach(s=>{
      if(s.dataset.filled==='1'){s.style.background='';return;}
      const r=s.getBoundingClientRect();
      const over=e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom;
      s.style.background=over?(+s.dataset.r===dRow&&+s.dataset.c===dCol?'rgba(29,158,117,.35)':'rgba(226,75,74,.2)'):'rgba(55,138,221,.15)';
    });
  };
  _onUp=e=>{
    if(!ghost||!dWrap)return;ghost.remove();ghost=null;
    slots.forEach(s=>{if(s.dataset.filled==='0')s.style.background='';});
    let hit=false;
    slots.forEach(s=>{
      if(hit||s.dataset.filled==='1')return;
      const r=s.getBoundingClientRect();
      if(e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom){
        hit=true;
        if(+s.dataset.r===dRow&&+s.dataset.c===dCol){
          s.dataset.filled='1';s.style.border='none';s.style.background='transparent';
          const pc2=document.createElement('canvas');pc2.width=ps;pc2.height=ps;
          pc2.getContext('2d').drawImage(dWrap.querySelector('canvas'),0,0,ps,ps);
          pc2.style.cssText=`position:absolute;left:${dCol*ps}px;top:${dRow*ps}px;`;
          boardEl.appendChild(pc2);
          dWrap.dataset.used='1';dWrap.style.opacity='0';dWrap.style.pointerEvents='none';
          placed++;document.getElementById('pzcnt').textContent=placed;
          progFill.style.width=(placed/total*100)+'%';
          const bR=boardEl.getBoundingClientRect();const gR=G.getBoundingClientRect();
          const fb=document.createElement('div');fb.className='fbtxt';fb.textContent='✅';
          fb.style.cssText=`left:${bR.left-gR.left+dCol*ps+ps/2-12}px;top:${bR.top-gR.top+dRow*ps-4}px;font-size:22px;`;
          G.appendChild(fb);setTimeout(()=>fb.remove(),800);
          if(placed===total){document.removeEventListener('mousemove',_onMove);document.removeEventListener('mouseup',_onUp);setTimeout(()=>showPzClear(lv),700);}
        } else {
          dWrap.style.opacity='1';dWrap.style.outline='2px solid #E24B4A';
          setTimeout(()=>{dWrap.style.outline='';},500);
          const bR=boardEl.getBoundingClientRect();const gR=G.getBoundingClientRect();
          const fb=document.createElement('div');fb.className='fbtxt';fb.textContent='❌';
          fb.style.cssText=`left:${bR.left-gR.left+s.dataset.c*ps}px;top:${bR.top-gR.top+s.dataset.r*ps-4}px;font-size:22px;color:#E24B4A;`;
          G.appendChild(fb);setTimeout(()=>fb.remove(),700);
        }
      }
    });
    if(!hit)dWrap.style.opacity='1';
    dWrap=null;dRow=-1;dCol=-1;
  };
  document.addEventListener('mousemove',_onMove);
  document.addEventListener('mouseup',_onUp);
}

function showPzClear(lv){
  G.innerHTML='';
  const e=['🐶','🐱','🐻'],n=['강아지','고양이','곰'];
  const o=document.createElement('div');o.id='overlay';
  let btns=`<button class="ov-btn" onclick="startPuzzle(${lv})">다시 하기</button>`;
  if(lv<3)btns+=`<button class="ov-btn next" onclick="startPuzzle(${lv+1})">다음 단계 ➡️</button>`;
  else btns+=`<button class="ov-btn" style="background:#BA7517" onclick="startPuzzle(1)">처음부터 🔄</button>`;
  o.innerHTML=`<h2>${e[lv-1]}🎉${e[lv-1]}</h2><p>${n[lv-1]} 퍼즐 완성! 최고예요!</p><div class="ov-btns">${btns}</div>`;
  G.appendChild(o);
}

function startDraw(){
  let drawing=false;
  const canvas=document.createElement('canvas');canvas.width=G.offsetWidth||648;canvas.height=G.offsetHeight||420;
  canvas.style.cssText='position:absolute;top:0;left:0;cursor:crosshair;';G.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const colors=['#E24B4A','#378ADD','#1D9E75','#BA7517','#993556','#534AB7','#f0a500'];let ci=0,lw=5;
  const hint=document.createElement('div');hint.style.cssText='position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:14px;color:#888;pointer-events:none;';hint.textContent='마우스를 누른 채로 그림을 그려봐요 🎨';G.appendChild(hint);
  const row=document.createElement('div');row.style.cssText='position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:10;align-items:center;';
  colors.forEach((c,i)=>{const btn=document.createElement('div');btn.style.cssText=`width:22px;height:22px;border-radius:50%;background:${c};cursor:pointer;border:2px solid white;`;btn.addEventListener('click',()=>ci=i);row.appendChild(btn);});
  const ss=document.createElement('input');ss.type='range';ss.min=2;ss.max=20;ss.value=5;ss.step=1;ss.style.cssText='width:60px;cursor:pointer;';ss.addEventListener('input',()=>lw=parseInt(ss.value));row.appendChild(ss);G.appendChild(row);
  const cb=document.createElement('button');cb.textContent='지우기';cb.style.cssText='position:absolute;top:10px;left:10px;padding:4px 12px;font-size:13px;border-radius:8px;z-index:10;cursor:pointer;';cb.addEventListener('click',()=>ctx.clearRect(0,0,canvas.width,canvas.height));G.appendChild(cb);
  canvas.addEventListener('mousedown',e=>{drawing=true;hint.style.display='none';const r=canvas.getBoundingClientRect();ctx.beginPath();ctx.moveTo(e.clientX-r.left,e.clientY-r.top);ctx.strokeStyle=colors[ci];ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const r=canvas.getBoundingClientRect();ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke();ctx.beginPath();ctx.moveTo(e.clientX-r.left,e.clientY-r.top);ctx.strokeStyle=colors[ci];ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';});
  canvas.addEventListener('mouseup',()=>drawing=false);canvas.addEventListener('mouseleave',()=>drawing=false);
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>startMode(t.dataset.m)));
startMode('click-easy');
</script>
</body>
</html>
