<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마우스 연습 게임</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { font-family: sans-serif; background: #f5f5f0; }
  #app { padding: 16px; max-width: 680px; margin: 0 auto; }
  #header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  #title { font-size: 20px; font-weight: 500; color: #111; }
  #score-board { display: flex; gap: 12px; }
  .score-item { background: #f0efe8; border-radius: 8px; padding: 6px 14px; font-size: 14px; color: #666; }
  .score-item span { font-weight: 500; color: #111; font-size: 16px; }
  #mission-bar { background: #f0efe8; border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
  #mission-icon { font-size: 24px; width: 36px; text-align: center; }
  #mission-text { font-size: 15px; font-weight: 500; color: #111; }
  #mission-sub { font-size: 13px; color: #888; margin-top: 2px; }
  #game-area { position: relative; width: 100%; height: 340px; background: #fff; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; cursor: default; }
  .target { position: absolute; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
  .target:hover { transform: scale(1.1); }
  .target.clicked { animation: pop 0.2s ease-out forwards; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(0)} }
  .draggable { position: absolute; cursor: grab; font-size: 32px; display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 10px; border: 2px solid #ccc; background: #fff; }
  .draggable.dragging { cursor: grabbing; opacity: 0.7; z-index: 100; }
  .drop-zone { position: absolute; width: 80px; height: 80px; border-radius: 10px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: background 0.2s; }
  .drop-zone.is-cart { width: 90px; height: 90px; font-size: 36px; border-color: #BA7517; border-width: 2.5px; }
  .drop-zone.highlight { background: #E1F5EE; border-color: #1D9E75; }
  .drop-zone.is-cart.highlight { background: #FAEEDA; border-color: #BA7517; }
  .drop-zone.matched { animation: bounce 0.3s ease; }
  @keyframes bounce { 0%{transform:scale(1)} 40%{transform:scale(1.18)} 100%{transform:scale(1)} }
  .dbl-target { position: absolute; cursor: pointer; font-size: 30px; width: 64px; height: 64px; border-radius: 50%; background: #f0efe8; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; }
  .feedback { position: absolute; pointer-events: none; font-size: 20px; font-weight: 500; animation: float 0.9s ease-out forwards; z-index: 200; }
  @keyframes float { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-54px)} }
  #progress-bar { height: 10px; background: #ddd; border-radius: 5px; margin-bottom: 14px; }
  #progress-fill { height: 10px; border-radius: 5px; background: linear-gradient(90deg, #1D9E75, #f0a500); transition: width 0.3s; }
  #tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .tab { padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #888; }
  .tab.active { background: #f0efe8; color: #111; font-weight: 500; border-color: #bbb; }
  #result-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; z-index: 300; }
  #result-overlay h2 { font-size: 40px; margin-bottom: 8px; }
  #result-overlay p { font-size: 18px; color: #444; margin-bottom: 20px; font-weight: 500; }
  #result-overlay button { padding: 10px 28px; border-radius: 8px; background: #1D9E75; color: white; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
  #result-overlay button:hover { background: #0F6E56; }
  .cart-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #BA7517; font-weight: 500; white-space: nowrap; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">🖱️ 마우스 연습 게임</div>
    <div id="score-board">
      <div class="score-item">점수 <span id="score">0</span> / 1000</div>
      <div class="score-item">⭐ <span id="stars">0</span> / 3</div>
    </div>
  </div>
  <div id="tabs">
    <div class="tab active" data-mode="click">🎯 클릭</div>
    <div class="tab" data-mode="dblclick">👆 두 번 클릭</div>
    <div class="tab" data-mode="drag">🛒 드래그&드롭</div>
    <div class="tab" data-mode="trail">✏️ 그림 그리기</div>
  </div>
  <div id="mission-bar">
    <div id="mission-icon">🎯</div>
    <div>
      <div id="mission-text">풍선을 클릭해서 터뜨려요!</div>
      <div id="mission-sub">남은 점수: <span id="score-left">1000</span>점</div>
    </div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  <div id="game-area"></div>
</div>

<script>
const gameArea   = document.getElementById('game-area');
const scoreEl    = document.getElementById('score');
const starsEl    = document.getElementById('stars');
const missionTextEl = document.getElementById('mission-text');
const missionIconEl = document.getElementById('mission-icon');
const missionSubEl  = document.getElementById('mission-sub');
const scoreLeftEl   = document.getElementById('score-left');
const progressFill  = document.getElementById('progress-fill');
const progressBar   = document.getElementById('progress-bar');
const scoreBoardEl  = document.getElementById('score-board');

const SCORE_GOAL = 1000;
let score = 0;
let mode = 'click';
let done = false;

const BALLOONS = ['🎈','🎉','⭐','🌟','💫','🍎','🍊','🍋','🍇','🍓'];
const FRUITS   = ['🍎','🍊','🍋','🍇','🍓'];
const BOXES    = ['📦','🎁','📫','🗃️','📮'];

function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function randPts(min, max) {
  const val = rnd(min, max);
  return Math.round(val / 10) * 10;
}

function showFeedback(x, y, pts, color) {
  const el = document.createElement('div');
  el.className = 'feedback';
  el.textContent = '+' + pts + '점!';
  el.style.cssText = `left:${x}px;top:${y}px;color:${color || '#1D9E75'};`;
  gameArea.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function addScore(pts, x, y, color) {
  if (done) return;
  score = Math.min(SCORE_GOAL, score + pts);
  scoreEl.textContent = score;
  scoreLeftEl.textContent = Math.max(0, SCORE_GOAL - score);
  starsEl.textContent = Math.min(3, Math.floor(score / (SCORE_GOAL / 3)));
  progressFill.style.width = (score / SCORE_GOAL * 100).toFixed(1) + '%';
  showFeedback(x, y, pts, color);
  if (score >= SCORE_GOAL) {
    done = true;
    setTimeout(showResult, 500);
  }
}

function showResult() {
  gameArea.innerHTML = '';
  const ol = document.createElement('div');
  ol.id = 'result-overlay';
  ol.innerHTML = `<h2>🎉🎊🎉</h2><p>1000점 달성! 최고예요!</p><button onclick="resetGame()">다시 하기</button>`;
  gameArea.appendChild(ol);
}

function resetGame() {
  score = 0; done = false;
  scoreEl.textContent = 0;
  scoreLeftEl.textContent = SCORE_GOAL;
  starsEl.textContent = 0;
  progressFill.style.width = '0%';
  gameArea.innerHTML = '';
  startMode(mode);
}

function startMode(m) {
  mode = m;
  gameArea.innerHTML = '';

  const info = {
    click:    { icon:'🎯', text:'풍선을 클릭해서 터뜨려요! (10~30점 랜덤)' },
    dblclick: { icon:'👆', text:'상자를 두 번 클릭해서 열어요! (10~30점 랜덤)' },
    drag:     { icon:'🛒', text:'🛒 카트 100~300점 / 🧺 바구니 50~150점' },
    trail:    { icon:'✏️', text:'마우스를 누른 채 자유롭게 그려봐요!' }
  };

  missionIconEl.textContent = info[m].icon;
  missionTextEl.textContent = info[m].text;

  if (m === 'trail') {
    scoreBoardEl.style.display = 'none';
    progressBar.style.display = 'none';
    missionSubEl.style.display = 'none';
  } else {
    scoreBoardEl.style.display = 'flex';
    progressBar.style.display = 'block';
    missionSubEl.style.display = 'block';
  }

  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));

  if (m === 'click')         startClick();
  else if (m === 'dblclick') startDblClick();
  else if (m === 'drag')     startDrag();
  else                       startTrail();
}

/* ── 클릭 ── */
function startClick() {
  function spawn() {
    if (done) return;
    const el = document.createElement('div');
    el.className = 'target';
    const size = rnd(44, 64);
    el.style.cssText = `width:${size}px;height:${size}px;left:${rnd(10,570)}px;top:${rnd(10,270)}px;font-size:${Math.round(size*0.7)}px;`;
    el.textContent = BALLOONS[rnd(0, BALLOONS.length - 1)];
    let used = false;
    el.addEventListener('click', e => {
      if (done || used) return;
      used = true;
      el.classList.add('clicked');
      const r = gameArea.getBoundingClientRect();
      const pts = randPts(10, 30);
      addScore(pts, e.clientX - r.left - 20, e.clientY - r.top - 10);
      setTimeout(() => { if (el.parentNode) el.remove(); spawn(); }, 200);
    });
    gameArea.appendChild(el);
    const life = rnd(2500, 4000);
    setTimeout(() => { if (el.parentNode && !used) { el.remove(); spawn(); } }, life);
  }
  for (let i = 0; i < 6; i++) setTimeout(spawn, i * 250);
}

/* ── 두 번 클릭 ── */
function startDblClick() {
  function spawnBox() {
    if (done) return;
    const el = document.createElement('div');
    el.className = 'dbl-target';
    el.style.cssText = `left:${rnd(20,540)}px;top:${rnd(20,255)}px;`;
    el.textContent = BOXES[rnd(0, BOXES.length - 1)];
    let clicks = 0, timer, used = false;
    el.addEventListener('click', e => {
      if (done || used) return;
      clicks++;
      clearTimeout(timer);
      timer = setTimeout(() => { clicks = 0; }, 400);
      if (clicks >= 2) {
        used = true;
        el.textContent = '🎊';
        const r = gameArea.getBoundingClientRect();
        const pts = randPts(10, 30);
        addScore(pts, e.clientX - r.left - 20, e.clientY - r.top - 10);
        setTimeout(() => { if (el.parentNode) el.remove(); spawnBox(); }, 400);
      }
    });
    gameArea.appendChild(el);
  }
  for (let i = 0; i < 5; i++) setTimeout(spawnBox, i * 350);
}

/* ── 드래그&드롭 ── */
function startDrag() {
  const cartDrop = document.createElement('div');
  cartDrop.className = 'drop-zone is-cart';
  cartDrop.dataset.type = 'cart';
  cartDrop.style.cssText = 'left:470px;top:120px;';
  cartDrop.textContent = '🛒';
  const cLbl = document.createElement('div');
  cLbl.className = 'cart-label';
  cLbl.textContent = '100~300점';
  cartDrop.appendChild(cLbl);
  gameArea.appendChild(cartDrop);

  const basketDrop = document.createElement('div');
  basketDrop.className = 'drop-zone';
  basketDrop.dataset.type = 'basket';
  basketDrop.style.cssText = 'left:470px;top:25px;';
  basketDrop.textContent = '🧺';
  const bLbl = document.createElement('div');
  bLbl.className = 'cart-label';
  bLbl.style.color = '#1D9E75';
  bLbl.textContent = '50~150점';
  basketDrop.appendChild(bLbl);
  gameArea.appendChild(basketDrop);

  const hint = document.createElement('div');
  hint.style.cssText = 'position:absolute;right:8px;bottom:10px;font-size:11px;color:#888;text-align:right;pointer-events:none;line-height:1.7;';
  hint.innerHTML = '🛒 카트 = 100~300점<br>🧺 바구니 = 50~150점';
  gameArea.appendChild(hint);

  function spawnFruit() {
    if (done) return;
    const el = document.createElement('div');
    el.className = 'draggable';
    el.textContent = FRUITS[rnd(0, FRUITS.length - 1)];
    el.style.left = rnd(20, 150) + 'px';
    el.style.top  = rnd(20, 265) + 'px';
    let sx, sy, sl, st, dragging = false, used = false;

    el.addEventListener('mousedown', e => {
      if (used) return;
      e.preventDefault();
      dragging = true;
      el.classList.add('dragging');
      sx = e.clientX; sy = e.clientY;
      sl = parseInt(el.style.left); st = parseInt(el.style.top);
      document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.add('highlight'));
    });

    const onMove = e => {
      if (!dragging) return;
      el.style.left = (sl + e.clientX - sx) + 'px';
      el.style.top  = (st + e.clientY - sy) + 'px';
    };
    const onUp = () => {
      if (!dragging) return;
      dragging = false;
      el.classList.remove('dragging');
      document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('highlight'));
      if (used) return;
      const er = el.getBoundingClientRect();
      document.querySelectorAll('.drop-zone').forEach(dz => {
        if (used) return;
        const dr = dz.getBoundingClientRect();
        const ox = Math.max(0, Math.min(er.right, dr.right) - Math.max(er.left, dr.left));
        const oy = Math.max(0, Math.min(er.bottom, dr.bottom) - Math.max(er.top, dr.top));
        if (ox * oy > 600) {
          used = true;
          const pts = dz.dataset.type === 'cart'
            ? randPts(100, 300)
            : randPts(50, 150);
          dz.classList.add('matched');
          addScore(pts, parseInt(el.style.left) + 10, parseInt(el.style.top), dz.dataset.type === 'cart' ? '#BA7517' : '#1D9E75');
          el.remove();
          setTimeout(() => { dz.classList.remove('matched'); spawnFruit(); }, 400);
        }
      });
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    gameArea.appendChild(el);
  }

  for (let i = 0; i < 3; i++) setTimeout(spawnFruit, i * 200);
}

/* ── 그림 그리기 ── */
function startTrail() {
  let drawing = false;
  const canvas = document.createElement('canvas');
  canvas.width  = gameArea.offsetWidth || 648;
  canvas.height = 340;
  canvas.style.cssText = 'position:absolute;top:0;left:0;cursor:crosshair;';
  gameArea.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#E24B4A','#378ADD','#1D9E75','#BA7517','#993556','#534AB7'];
  let ci = 0;

  const hint = document.createElement('div');
  hint.style.cssText = 'position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:14px;color:#888;pointer-events:none;';
  hint.textContent = '마우스를 누른 채로 그림을 그려봐요 🎨';
  gameArea.appendChild(hint);

  const row = document.createElement('div');
  row.style.cssText = 'position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:10;';
  colors.forEach((c, i) => {
    const btn = document.createElement('div');
    btn.style.cssText = `width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:2px solid white;`;
    btn.addEventListener('click', () => { ci = i; });
    row.appendChild(btn);
  });
  gameArea.appendChild(row);

  const clrBtn = document.createElement('button');
  clrBtn.textContent = '지우기';
  clrBtn.style.cssText = 'position:absolute;top:10px;left:10px;padding:4px 12px;font-size:13px;border-radius:8px;z-index:10;cursor:pointer;';
  clrBtn.addEventListener('click', () => ctx.clearRect(0, 0, canvas.width, canvas.height));
  gameArea.appendChild(clrBtn);

  canvas.addEventListener('mousedown', e => {
    drawing = true;
    const r = canvas.getBoundingClientRect();
    ctx.beginPath(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
    ctx.strokeStyle = colors[ci]; ctx.lineWidth = 5; ctx.lineCap = 'round';
    hint.style.display = 'none';
  });
  canvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    const r = canvas.getBoundingClientRect();
    ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
    ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
  });
  canvas.addEventListener('mouseup', () => { drawing = false; });
  canvas.addEventListener('mouseleave', () => { drawing = false; });
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  if (!done) { score = 0; scoreEl.textContent = 0; scoreLeftEl.textContent = SCORE_GOAL; starsEl.textContent = 0; progressFill.style.width = '0%'; }
  done = false;
  startMode(t.dataset.mode);
}));

startMode('click');
</script>
</body>
</html>
