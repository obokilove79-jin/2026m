<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마우스 연습 게임</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { font-family: sans-serif; background: #f5f5f0; }
  #app { padding: 16px; max-width: 680px; margin: 0 auto; }
  #header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  #title { font-size: 20px; font-weight: 500; color: #111; }
  #score-board { display: flex; gap: 12px; }
  .score-item { background: #f0efe8; border-radius: 8px; padding: 6px 14px; font-size: 14px; color: #666; }
  .score-item span { font-weight: 500; color: #111; font-size: 16px; }
  #mission-bar { background: #f0efe8; border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
  #mission-icon { font-size: 24px; width: 36px; text-align: center; }
  #mission-text { font-size: 15px; font-weight: 500; color: #111; }
  #mission-sub { font-size: 13px; color: #888; margin-top: 2px; }
  #game-area { position: relative; width: 100%; height: 340px; background: #fff; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; cursor: default; }
  .target { position: absolute; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
  .target:hover { transform: scale(1.1); }
  .target.clicked { animation: pop 0.2s ease-out forwards; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(0)} }
  .draggable { position: absolute; cursor: grab; font-size: 32px; display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 10px; border: 2px solid #ccc; background: #fff; }
  .draggable.dragging { cursor: grabbing; opacity: 0.7; z-index: 100; }
  .drop-zone { position: absolute; width: 80px; height: 80px; border-radius: 10px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: background 0.2s; }
  .drop-zone.is-cart { width: 90px; height: 90px; font-size: 36px; border-color: #BA7517; border-width: 2.5px; }
  .drop-zone.highlight { background: #E1F5EE; border-color: #1D9E75; }
  .drop-zone.is-cart.highlight { background: #FAEEDA; border-color: #BA7517; }
  .drop-zone.matched { animation: bounce 0.3s ease; }
  @keyframes bounce { 0%{transform:scale(1)} 40%{transform:scale(1.18)} 100%{transform:scale(1)} }
  .dbl-target { position: absolute; cursor: pointer; font-size: 30px; width: 64px; height: 64px; border-radius: 50%; background: #f0efe8; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; }
  .feedback { position: absolute; pointer-events: none; font-size: 20px; font-weight: 500; animation: float 0.9s ease-out forwards; z-index: 200; }
  @keyframes float { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-54px)} }
  #progress-bar { height: 6px; background: #ddd; border-radius: 3px; margin-bottom: 14px; }
  #progress-fill { height: 6px; border-radius: 3px; background: #1D9E75; transition: width 0.3s; }
  #tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .tab { padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #888; }
  .tab.active { background: #f0efe8; color: #111; font-weight: 500; border-color: #bbb; }
  #result-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; z-index: 300; }
  #result-overlay h2 { font-size: 32px; margin-bottom: 8px; }
  #result-overlay p { font-size: 16px; color: #666; margin-bottom: 20px; }
  #result-overlay button { padding: 10px 28px; border-radius: 8px; background: #1D9E75; color: white; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
  #result-overlay button:hover { background: #0F6E56; }
  .cart-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #BA7517; font-weight: 500; white-space: nowrap; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">🖱️ 마우스 연습 게임</div>
    <div id="score-board">
      <div class="score-item">점수 <span id="score">0</span></div>
      <div class="score-item">⭐ <span id="stars">0</span>/3</div>
    </div>
  </div>
  <div id="tabs">
    <div class="tab active" data-mode="click">🎯 클릭</div>
    <div class="tab" data-mode="dblclick">👆 두 번 클릭</div>
    <div class="tab" data-mode="drag">🛒 드래그&드롭</div>
    <div class="tab" data-mode="trail">✏️ 그림 그리기</div>
  </div>
  <div id="mission-bar">
    <div id="mission-icon">🎯</div>
    <div>
      <div id="mission-text">풍선을 클릭해서 터뜨려요!</div>
      <div id="mission-sub">남은 목표: <span id="target-left">20</span>개</div>
    </div>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  <div id="game-area"></div>
</div>

<script>
const gameArea = document.getElementById('game-area');
const scoreEl = document.getElementById('score');
const starsEl = document.getElementById('stars');
const missionText = document.getElementById('mission-text');
const missionIcon = document.getElementById('mission-icon');
const missionSubEl = document.getElementById('mission-sub');
const targetLeftEl = document.getElementById('target-left');
const progressFill = document.getElementById('progress-fill');
const progressBar = document.getElementById('progress-bar');
const scoreBoardEl = document.getElementById('score-board');

let score = 0, mode = 'click', hits = 0, goal = 0;

const STAR_MAX = 1000;

const missions = {
  click:    { icon:'🎯', text:'풍선을 클릭해서 터뜨려요!',              goal:20 },
  dblclick: { icon:'👆', text:'상자를 두 번 클릭해서 열어요!',           goal:20 },
  drag:     { icon:'🛒', text:'🛒 카트 = 200점 / 🧺 바구니 = 100점',   goal:5  },
  trail:    { icon:'✏️', text:'마우스를 누른 채 자유롭게 그려봐요!',      goal:0  }
};

const BALLOONS = ['🎈','🎉','⭐','🌟','💫','🍎','🍊','🍋','🍇','🍓'];
const FRUITS   = ['🍎','🍊','🍋','🍇','🍓'];
const BOXES    = ['📦','🎁','📫','🗃️','📮'];

function showFeedback(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'feedback';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.color = color || '#1D9E75';
  gameArea.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function addScore(pts, x, y) {
  score += pts;
  scoreEl.textContent = score;
  starsEl.textContent = Math.min(3, Math.floor(score / (STAR_MAX / 3)));
  const color = pts >= 200 ? '#BA7517' : '#1D9E75';
  showFeedback(x - 20, y - 10, '+' + pts + '점!', color);
}

function updateProgress() {
  const pct = Math.min(100, (hits / goal) * 100);
  progressFill.style.width = pct + '%';
  targetLeftEl.textContent = Math.max(0, goal - hits);
  if (hits >= goal) showResult();
}

function showResult() {
  const overlay = document.createElement('div');
  overlay.id = 'result-overlay';
  const s = Math.min(3, Math.floor(score / (STAR_MAX / 3)));
  overlay.innerHTML = `<h2>${'⭐'.repeat(s) + '☆'.repeat(3-s)}</h2><p>잘했어요! 총 점수: ${score}점</p><button onclick="resetGame()">다시 하기</button>`;
  gameArea.appendChild(overlay);
}

function clearGame() { gameArea.innerHTML = ''; hits = 0; progressFill.style.width = '0%'; }
function resetGame() { score = 0; scoreEl.textContent = 0; starsEl.textContent = 0; clearGame(); startMode(mode); }
function rnd(a, b)   { return Math.floor(Math.random() * (b - a)) + a; }

function startMode(m) {
  mode = m;
  clearGame();
  const mi = missions[m];
  missionIcon.textContent = mi.icon;
  missionText.textContent = mi.text;
  goal = mi.goal;

  if (m === 'trail') {
    scoreBoardEl.style.display = 'none';
    progressBar.style.display = 'none';
    missionSubEl.style.display = 'none';
  } else {
    scoreBoardEl.style.display = 'flex';
    progressBar.style.display = 'block';
    missionSubEl.style.display = 'block';
    targetLeftEl.textContent = goal;
    updateProgress();
  }

  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  if (m === 'click')         startClick();
  else if (m === 'dblclick') startDblClick();
  else if (m === 'drag')     startDrag();
  else if (m === 'trail')    startTrail();
}

function startClick() {
  let spawned = 0;
  function spawn() {
    if (spawned >= goal + 8) return;
    spawned++;
    const el = document.createElement('div');
    el.className = 'target';
    const size = rnd(44, 64);
    el.style.cssText = `width:${size}px;height:${size}px;left:${rnd(10,570)}px;top:${rnd(10,270)}px;font-size:${Math.round(size*0.7)}px;`;
    el.textContent = BALLOONS[rnd(0, BALLOONS.length)];
    el.addEventListener('click', e => {
      if (hits >= goal) return;
      el.classList.add('clicked');
      const r = gameArea.getBoundingClientRect();
      addScore(10, e.clientX - r.left, e.clientY - r.top);
      hits++; updateProgress();
      setTimeout(() => { el.remove(); if (hits < goal) spawn(); }, 200);
    });
    gameArea.appendChild(el);
    setTimeout(() => { if (el.parentNode) { el.remove(); if (hits < goal) spawn(); } }, 3500);
  }
  for (let i = 0; i < 6; i++) setTimeout(spawn, i * 300);
}

function startDblClick() {
  let opened = 0;
  function spawnBox() {
    const el = document.createElement('div');
    el.className = 'dbl-target';
    el.style.cssText = `left:${rnd(20,560)}px;top:${rnd(20,255)}px;`;
    el.textContent = BOXES[rnd(0, BOXES.length)];
    let clicks = 0, timer;
    el.addEventListener('click', e => {
      clicks++;
      clearTimeout(timer);
      timer = setTimeout(() => { clicks = 0; }, 400);
      if (clicks >= 2) {
        clicks = 0;
        el.textContent = '🎊';
        const r = gameArea.getBoundingClientRect();
        addScore(10, e.clientX - r.left, e.clientY - r.top);
        opened++; hits++; updateProgress();
        setTimeout(() => el.remove(), 500);
        if (opened < goal) setTimeout(spawnBox, 600);
      }
    });
    gameArea.appendChild(el);
  }
  for (let i = 0; i < 5; i++) setTimeout(spawnBox, i * 400);
}

function startDrag() {
  const fruits = FRUITS.slice(0, goal);

  const cartDrop = document.createElement('div');
  cartDrop.className = 'drop-zone is-cart';
  cartDrop.dataset.type = 'cart';
  cartDrop.style.cssText = 'left:480px;top:125px;';
  cartDrop.textContent = '🛒';
  const cartLabel = document.createElement('div');
  cartLabel.className = 'cart-label';
  cartLabel.textContent = '200점!';
  cartDrop.appendChild(cartLabel);
  gameArea.appendChild(cartDrop);

  const basketDrop = document.createElement('div');
  basketDrop.className = 'drop-zone';
  basketDrop.dataset.type = 'basket';
  basketDrop.style.cssText = 'left:480px;top:30px;';
  basketDrop.textContent = '🧺';
  const bLabel = document.createElement('div');
  bLabel.className = 'cart-label';
  bLabel.style.color = '#1D9E75';
  bLabel.textContent = '100점';
  basketDrop.appendChild(bLabel);
  gameArea.appendChild(basketDrop);

  const hint = document.createElement('div');
  hint.style.cssText = 'position:absolute;right:8px;bottom:10px;font-size:11px;color:#888;text-align:right;pointer-events:none;line-height:1.6;';
  hint.innerHTML = '🛒 카트 = 200점<br>🧺 바구니 = 100점';
  gameArea.appendChild(hint);

  fruits.forEach((fruit) => {
    const el = document.createElement('div');
    el.className = 'draggable';
    el.textContent = fruit;
    el.style.left = rnd(20, 160) + 'px';
    el.style.top  = rnd(20, 265) + 'px';
    let startX, startY, startLeft, startTop, dragging = false;

    el.addEventListener('mousedown', e => {
      e.preventDefault();
      dragging = true;
      el.classList.add('dragging');
      startX = e.clientX; startY = e.clientY;
      startLeft = parseInt(el.style.left); startTop = parseInt(el.style.top);
      document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.add('highlight'));
    });

    const onMove = e => {
      if (!dragging) return;
      el.style.left = (startLeft + e.clientX - startX) + 'px';
      el.style.top  = (startTop  + e.clientY - startY) + 'px';
    };
    const onUp = () => {
      if (!dragging) return;
      dragging = false;
      el.classList.remove('dragging');
      document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('highlight'));
      const elRect = el.getBoundingClientRect();
      let matched = false;
      document.querySelectorAll('.drop-zone').forEach(dz => {
        if (matched) return;
        const dzRect = dz.getBoundingClientRect();
        const ox = Math.max(0, Math.min(elRect.right, dzRect.right) - Math.max(elRect.left, dzRect.left));
        const oy = Math.max(0, Math.min(elRect.bottom, dzRect.bottom) - Math.max(elRect.top, dzRect.top));
        if (ox * oy > 600) {
          matched = true;
          const pts = dz.dataset.type === 'cart' ? 200 : 100;
          dz.classList.add('matched');
          addScore(pts, parseInt(el.style.left) + 30, parseInt(el.style.top));
          hits++; updateProgress();
          el.remove();
          setTimeout(() => dz.classList.remove('matched'), 400);
        }
      });
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    gameArea.appendChild(el);
  });
}

function startTrail() {
  let drawing = false;
  const canvas = document.createElement('canvas');
  canvas.width  = gameArea.offsetWidth || 648;
  canvas.height = 340;
  canvas.style.cssText = 'position:absolute;top:0;left:0;cursor:crosshair;';
  gameArea.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#E24B4A','#378ADD','#1D9E75','#BA7517','#993556','#534AB7'];
  let colorIdx = 0;

  const hint = document.createElement('div');
  hint.style.cssText = 'position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:14px;color:#888;pointer-events:none;';
  hint.textContent = '마우스를 누른 채로 그림을 그려봐요 🎨';
  gameArea.appendChild(hint);

  const colorRow = document.createElement('div');
  colorRow.style.cssText = 'position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:10;';
  colors.forEach((c, i) => {
    const btn = document.createElement('div');
    btn.style.cssText = `width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:2px solid white;`;
    btn.addEventListener('click', () => { colorIdx = i; });
    colorRow.appendChild(btn);
  });
  gameArea.appendChild(colorRow);

  const clearBtn = document.createElement('button');
  clearBtn.textContent = '지우기';
  clearBtn.style.cssText = 'position:absolute;top:10px;left:10px;padding:4px 12px;font-size:13px;border-radius:8px;z-index:10;cursor:pointer;';
  clearBtn.addEventListener('click', () => ctx.clearRect(0, 0, canvas.width, canvas.height));
  gameArea.appendChild(clearBtn);

  canvas.addEventListener('mousedown', e => {
    drawing = true;
    const r = canvas.getBoundingClientRect();
    ctx.beginPath();
    ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
    ctx.strokeStyle = colors[colorIdx];
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    hint.style.display = 'none';
  });
  canvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    const r = canvas.getBoundingClientRect();
    ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
  });
  canvas.addEventListener('mouseup', () => { drawing = false; });
  canvas.addEventListener('mouseleave', () => { drawing = false; });
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => startMode(t.dataset.mode)));
startMode('click');
</script>
</body>
</html>
